name: Bug Report
description: Create a report to help us reproduce and fix the bug
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us understand and reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug in detail...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
      placeholder: |
        1. 
        2. 
        3. 
        4. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened...
    validations:
      required: true

  - type: textarea
    id: device-info
    attributes:
      label: Device Information
      description: |
        Please provide your device details:
        - Android Version:
        - Device Model:
        - App Version:
      placeholder: |
        - Android Version: 
        - Device Model: 
        - App Version: 

  - type: input
    id: ue5-version
    attributes:
      label: UE5 Version
      description: Which version of Unreal Engine 5 are you using?
      placeholder: e.g., UE 5.3.2

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: |
        Please paste relevant log output or attach screenshots here.
        You can use ``` to format log blocks.
      placeholder: |
        ```
        [Paste your logs here]
        ```
        
        ![screenshot](url_to_screenshot)
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for similar issues
          required: true
        - label: I can reproduce the bug consistently
          required: true
        - label: I have provided complete logs/screenshots
          required: false
